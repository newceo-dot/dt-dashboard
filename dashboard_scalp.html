<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DT Scalp - 단타 스캘핑</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,'Segoe UI','Malgun Gothic',sans-serif;}
:root{
  --bg:#0a0e14;--bg2:#11161f;--bg3:#1a2030;--bd:#2a3142;
  --tx:#e4e8f0;--tx2:#8a94a8;--tx3:#5a6478;
  --gn:#0fd66f;--rd:#ff4b6e;--gd:#ffa726;--bl:#5b9eff;
  --pu:#a371f7;--cy:#39d3c5;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-size:13px;overflow-x:hidden;}
body{display:flex;flex-direction:column;min-height:100vh;}

/* === 헤더 === */
#hd{background:var(--bg2);border-bottom:1px solid var(--bd);padding:6px 8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;position:sticky;top:0;z-index:100;min-height:48px;}
.logo{font-size:14px;font-weight:900;color:var(--gd);letter-spacing:0.5px;}
.coin-sel{background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:4px 8px;border-radius:4px;font-size:12px;font-weight:700;}
.hb{background:var(--bg3);border:1px solid var(--bd);padding:3px 7px;border-radius:4px;display:flex;flex-direction:column;align-items:center;line-height:1.2;}
.hl{font-size:8px;color:var(--tx3);font-weight:600;}
.hv{font-size:12px;font-weight:800;color:var(--tx);}
.live{margin-left:auto;font-size:9px;font-weight:700;padding:3px 7px;border-radius:3px;}
.live.on{background:rgba(15,214,111,0.15);color:var(--gn);}
.live.off{background:rgba(255,75,110,0.15);color:var(--rd);}

/* === 신호 빅 배너 === */
#signal-banner{background:var(--bg2);border-bottom:1px solid var(--bd);padding:10px;display:flex;align-items:center;justify-content:space-between;gap:8px;}
.sig-side{display:flex;flex-direction:column;align-items:center;}
.sig-arrow{font-size:32px;font-weight:900;line-height:1;}
.sig-arrow.long{color:var(--gn);}
.sig-arrow.short{color:var(--rd);}
.sig-arrow.wait{color:var(--tx3);}
.sig-label{font-size:10px;font-weight:700;color:var(--tx2);margin-top:2px;}
.sig-score-box{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 8px;}
.sig-score{font-size:32px;font-weight:900;line-height:1;}
.sig-score.s8{color:var(--bl);}
.sig-score.s12{color:var(--gd);}
.sig-score.s15{color:var(--gn);}
.sig-score.s0{color:var(--tx3);}
.sig-score-lbl{font-size:9px;font-weight:700;color:var(--tx2);margin-top:2px;}
.sig-plan{flex:1.5;font-size:10px;line-height:1.4;}
.sig-plan .pl-row{display:flex;justify-content:space-between;gap:6px;}
.sig-plan .pl-l{color:var(--tx2);}
.sig-plan .pl-v{font-weight:700;}
.pl-v.tp{color:var(--gn);}
.pl-v.sl{color:var(--rd);}
.pl-v.rr{color:var(--gd);}

@keyframes pulse-strong{0%,100%{box-shadow:0 0 0 0 rgba(15,214,111,0.5);}50%{box-shadow:0 0 20px 4px rgba(15,214,111,0.5);}}
#signal-banner.flash-long{animation:pulse-strong 1.2s infinite;}
@keyframes pulse-short{0%,100%{box-shadow:0 0 0 0 rgba(255,75,110,0.5);}50%{box-shadow:0 0 20px 4px rgba(255,75,110,0.5);}}
#signal-banner.flash-short{animation:pulse-short 1.2s infinite;}

/* === TF 탭 === */
#tf-tabs{background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;gap:0;}
.tf-tab{flex:1;background:transparent;border:none;color:var(--tx2);padding:8px 4px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;}
.tf-tab.active{color:var(--gd);border-bottom-color:var(--gd);background:var(--bg3);}

/* === 차트 영역 === */
#chart-wrap{position:relative;background:var(--bg);}
#main-chart{height:55vh;min-height:280px;position:relative;}
.ind-chart{height:60px;border-top:1px solid var(--bd);position:relative;}
.ind-label{position:absolute;top:2px;left:6px;font-size:9px;font-weight:700;color:var(--tx2);z-index:5;pointer-events:none;background:rgba(10,14,20,0.7);padding:1px 4px;border-radius:2px;}
.ind-val{position:absolute;top:2px;right:6px;font-size:9px;font-weight:700;z-index:5;pointer-events:none;background:rgba(10,14,20,0.7);padding:1px 4px;border-radius:2px;}

/* === 컨디션 체크 === */
#conds{background:var(--bg2);border-top:1px solid var(--bd);padding:8px;}
.cond-title{font-size:10px;font-weight:700;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.cond-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.cond-item{background:var(--bg3);border:1px solid var(--bd);padding:4px 6px;border-radius:3px;display:flex;align-items:center;justify-content:space-between;font-size:10px;}
.cond-item.ok{background:rgba(15,214,111,0.1);border-color:rgba(15,214,111,0.3);}
.cond-item.ok .cv{color:var(--gn);}
.cond-label{font-weight:600;color:var(--tx2);}
.cond-item.ok .cond-label{color:var(--tx);}
.cv{font-weight:800;color:var(--tx3);}

/* === 코인 스캐너 === */
#scanner{background:var(--bg2);border-top:1px solid var(--bd);padding:6px 8px;overflow-x:auto;white-space:nowrap;display:flex;gap:6px;}
.coin-card{flex-shrink:0;background:var(--bg3);border:1px solid var(--bd);padding:5px 8px;border-radius:4px;cursor:pointer;min-width:75px;text-align:center;}
.coin-card.active{border-color:var(--gd);background:rgba(255,167,38,0.1);}
.coin-card .cn{font-size:10px;font-weight:700;color:var(--tx);}
.coin-card .cs{font-size:9px;font-weight:600;color:var(--gd);margin-top:1px;}
.coin-card .cp{font-size:9px;color:var(--tx2);margin-top:1px;}

/* === 알림 로그 === */
#alerts{background:var(--bg2);border-top:1px solid var(--bd);padding:6px 8px;max-height:120px;overflow-y:auto;}
.alert-title{font-size:10px;font-weight:700;color:var(--tx2);margin-bottom:4px;}
.alert-row{font-size:9px;color:var(--tx2);padding:2px 0;border-bottom:1px solid var(--bd);display:flex;gap:6px;}
.alert-row .at{color:var(--tx3);}
.alert-row .as{font-weight:800;}
.alert-row .as.long{color:var(--gn);}
.alert-row .as.short{color:var(--rd);}

/* === 데스크탑 레이아웃 === */
#main-wrapper{display:grid;grid-template-columns:1fr 320px;gap:6px;padding:6px;}
#chart-area{display:grid;grid-template-columns:1fr 280px;gap:6px;grid-column:1;}
#left-side{display:flex;flex-direction:column;background:var(--bg2);border:1px solid var(--bd);border-radius:6px;overflow:hidden;}
#tv-chart{height:55vh;min-height:340px;}
#indicators-row{display:flex;flex-direction:column;}
#right-side{display:flex;flex-direction:column;gap:6px;}
.mini-block{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;}
.mini-label{font-size:11px;font-weight:700;color:var(--gd);padding:5px 8px;background:var(--bg3);border-bottom:1px solid var(--bd);}
.mini-chart{height:180px;position:relative;}
.mini-rsi{height:60px;border-top:1px solid var(--bd);position:relative;}

/* 트리플 크로스 배너: chart-area 위에 sticky로 표시 (자리 안 차지) */
#triple-banner{grid-column:1 / -1;padding:10px;border-radius:6px;text-align:center;font-size:16px;font-weight:900;letter-spacing:1px;display:none;}
#triple-banner.long,#triple-banner.short{display:block;}
#triple-banner.long{background:linear-gradient(90deg,rgba(15,214,111,0.25),rgba(15,214,111,0.1));border:2px solid var(--gn);color:var(--gn);box-shadow:0 0 20px rgba(15,214,111,0.3);}
#triple-banner.short{background:linear-gradient(90deg,rgba(255,75,110,0.25),rgba(255,75,110,0.1));border:2px solid var(--rd);color:var(--rd);box-shadow:0 0 20px rgba(255,75,110,0.3);}

/* 우측 사이드 정보패널 */
#info-side{grid-column:2;display:flex;flex-direction:column;gap:6px;}
#conds,#scanner-wrap,#alerts{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;}
#scanner{display:flex;flex-direction:column;gap:4px;padding:4px;}
.coin-card{display:flex;justify-content:space-between;align-items:center;min-width:0;padding:6px 10px;text-align:left;}
.coin-card .cn{font-size:13px;}
.coin-card .cs{font-size:12px;margin-top:0;}
.coin-card .cp{font-size:11px;margin-top:0;color:var(--tx2);}

/* 폰트 키움 */
.cond-title,.alert-title{font-size:12px;}
.cond-item{font-size:12px;padding:6px 8px;}
.cv{font-size:12px;}
.ind-label{font-size:11px;}
.ind-val{font-size:11px;}
.alert-row{font-size:11px;padding:4px 0;}
.alert-row .at{font-size:10px;}

/* === 모바일 === */
@media (max-width:899px){
  #signal-banner{position:sticky;top:48px;z-index:90;}
  #main-wrapper{grid-template-columns:1fr;padding:4px;gap:4px;}
  #chart-area{grid-template-columns:1.6fr 1fr;gap:4px;grid-column:1;}
  #info-side{grid-column:1;flex-direction:row;flex-wrap:wrap;}
  #info-side > div{flex:1;min-width:46%;}
  #tv-chart{height:42vh;min-height:240px;}
  .mini-chart{height:100px;}
  .mini-rsi{height:46px;}
  .mini-label{font-size:10px;padding:3px 6px;}
  .ind-chart{height:52px;}
  .ind-label{font-size:10px;}
  .ind-val{font-size:10px;}
  .sig-arrow{font-size:26px;}
  .sig-score{font-size:26px;}
  #triple-banner{font-size:14px;padding:8px;}
}

@media (max-width:600px){
  #chart-area{grid-template-columns:1fr;}
  #tv-chart{height:38vh;min-height:220px;}
  #right-side{flex-direction:row;}
  .mini-block{flex:1;}
  .mini-chart{height:120px;}
}

button{font-family:inherit;}
.btn{background:var(--bg3);border:1px solid var(--bd);color:var(--tx);padding:4px 8px;border-radius:3px;font-size:10px;font-weight:700;cursor:pointer;}
.btn:hover{background:var(--bd);}
.btn.active{background:var(--gd);color:#000;border-color:var(--gd);}
</style>
</head>
<body>

<!-- 헤더 -->
<div id="hd">
  <div class="logo">⚡ SCALP</div>
  <select class="coin-sel" id="coin-sel">
    <option value="BTCUSDT">BTC</option>
    <option value="ETHUSDT">ETH</option>
    <option value="SOLUSDT">SOL</option>
    <option value="XRPUSDT">XRP</option>
    <option value="BNBUSDT">BNB</option>
    <option value="DOGEUSDT">DOGE</option>
    <option value="AVAXUSDT">AVAX</option>
    <option value="ADAUSDT">ADA</option>
    <option value="LINKUSDT">LINK</option>
    <option value="DOTUSDT">DOT</option>
  </select>
  <div class="hb"><span class="hl">현재가</span><span class="hv" id="h-price">--</span></div>

  <button class="btn" id="snd-btn" onclick="toggleSound()">🔔 ON</button>

</div>

<!-- 신호 빅 배너 -->
<div id="signal-banner">
  <div class="sig-side">
    <div class="sig-arrow wait" id="sig-arrow">──</div>
    <div class="sig-label" id="sig-dir">대기</div>
  </div>
  <div class="sig-score-box">
    <div class="sig-score s0" id="sig-score">0</div>
    <div class="sig-score-lbl">/ 21 점</div>
  </div>
  <div class="sig-plan" id="sig-plan">
    <div class="pl-row"><span class="pl-l">진입</span><span class="pl-v" id="pl-entry">--</span></div>
    <div class="pl-row"><span class="pl-l">TP1</span><span class="pl-v tp" id="pl-tp1">+0.15%</span></div>
    <div class="pl-row"><span class="pl-l">TP2</span><span class="pl-v tp" id="pl-tp2">+0.30%</span></div>
    <div class="pl-row"><span class="pl-l">SL</span><span class="pl-v sl" id="pl-sl">-0.12%</span></div>
    <div class="pl-row"><span class="pl-l">RR</span><span class="pl-v rr" id="pl-rr">1:1.25</span></div>
  </div>
</div>

<!-- TF 탭 -->
<div id="tf-tabs">
  <button class="tf-tab" data-tf="1m">1M</button>
  <button class="tf-tab" data-tf="3m">3M</button>
  <button class="tf-tab active" data-tf="5m">5M ★</button>
  <button class="tf-tab" data-tf="15m">15M</button>
  <button class="tf-tab" data-tf="30m">30M</button>
</div>

<div id="main-wrapper">

<!-- 차트 영역 -->
<div id="chart-area">
  <!-- 왼쪽: 메인 TV + 보조지표 6개 -->
  <div id="left-side">
    <div id="tv-chart" style="background:#0a0e14;"></div>
    <div id="indicators-row">
      <div class="ind-chart" id="ind-rsi">
        <div class="ind-label">RSI(14)</div>
        <div class="ind-val" id="v-rsi">--</div>
      </div>
      <div class="ind-chart" id="ind-macd">
        <div class="ind-label">MACD(12,26,9)</div>
        <div class="ind-val" id="v-macd">--</div>
      </div>
      <div class="ind-chart" id="ind-adx">
        <div class="ind-label">ADX(14) · +DI · -DI</div>

      </div>
      <div class="ind-chart" id="ind-st1">
        <div class="ind-label">Stoch(5,3,3) ★빠름</div>
        <div class="ind-val" id="v-st1">--</div>
      </div>
      <div class="ind-chart" id="ind-st2">
        <div class="ind-label">Stoch(14,3,3) 중간</div>
        <div class="ind-val" id="v-st2">--</div>
      </div>
      <div class="ind-chart" id="ind-st3">
        <div class="ind-label">Stoch(21,7,7) 느림</div>
        <div class="ind-val" id="v-st3">--</div>
      </div>
    </div>
  </div>

  <!-- 오른쪽: 미니 1H + RSI + 미니 15M + RSI -->
  <div id="right-side">
    <div class="mini-block">
      <div class="mini-label">1시간봉</div>
      <div class="mini-chart" id="mini-1h"></div>
      <div class="mini-rsi" id="mini-1h-rsi">
        <div class="ind-label">RSI(14)</div>
        <div class="ind-val" id="v-mini-1h-rsi">--</div>
      </div>
    </div>
    <div class="mini-block">
      <div class="mini-label">15분봉</div>
      <div class="mini-chart" id="mini-15m"></div>
      <div class="mini-rsi" id="mini-15m-rsi">
        <div class="ind-label">RSI(14)</div>
        <div class="ind-val" id="v-mini-15m-rsi">--</div>
      </div>

</div>

<!-- 트리플 크로스 표시 -->
<div id="triple-banner" style="display:none;"></div>

<!-- 정보 사이드바 -->
<div id="info-side">

<!-- 조건 체크 -->
<div id="conds">
  <div class="cond-title">진입 조건 (실시간 5초)</div>
  <div class="cond-grid" id="cond-grid"></div>
</div>

<!-- 코인 스캐너 -->
<div id="scanner-wrap">
  <div style="padding:6px 8px 2px 8px;font-size:10px;font-weight:700;color:var(--tx2);text-transform:uppercase;background:var(--bg2);border-top:1px solid var(--bd);">스캐너 (탭 전환)</div>
  <div id="scanner"></div>
</div>

<!-- 알림 로그 -->
<div id="alerts">
  <div class="alert-title">최근 신호</div>
  <div id="alert-list"></div>
</div>

</div>

<script>
'use strict';
// ═══════════════════════════════════════════════
// 1. STATE
// ═══════════════════════════════════════════════
const COINS=[
  {code:'BTCUSDT',name:'BTC'},{code:'ETHUSDT',name:'ETH'},
  {code:'SOLUSDT',name:'SOL'},{code:'XRPUSDT',name:'XRP'},
  {code:'BNBUSDT',name:'BNB'},{code:'DOGEUSDT',name:'DOGE'},
  {code:'AVAXUSDT',name:'AVAX'},{code:'ADAUSDT',name:'ADA'},
  {code:'LINKUSDT',name:'LINK'},{code:'DOTUSDT',name:'DOT'},
];

const S={
  coin:'BTCUSDT',
  tf:'5m',
  prices:{}, // {symbol: price}
  candles:{}, // {symbol_tf: [...]}
  ws:null,
  charts:{main:null,rsi:null,macd:null,adx:null,st1:null,st2:null,st3:null},
  series:{},
  hLines:[],
  hLineMode:false,
  soundOn:true,
  lastScore:0,
  lastDir:'wait',
  alerts:[],
  scanScores:{},
};

// ═══════════════════════════════════════════════
// 2. UTIL
// ═══════════════════════════════════════════════
const fu=n=>{if(n==null||!isFinite(n))return'--';if(Math.abs(n)>=10000)return n.toLocaleString('en',{maximumFractionDigits:0});if(Math.abs(n)>=1)return n.toFixed(2);if(Math.abs(n)>=0.01)return n.toFixed(4);return n.toFixed(6);};

function logErr(label,e){console.warn('['+label+']',e&&e.message?e.message:e);}

function playBeep(freq=800,dur=120,vol=0.15){
  if(!S.soundOn)return;
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=freq;
    g.gain.setValueAtTime(vol,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur/1000);
    o.start();o.stop(ctx.currentTime+dur/1000);
  }catch(e){}
}
function vibrate(p){if(navigator.vibrate&&S.soundOn)navigator.vibrate(p);}

// ═══════════════════════════════════════════════
// 3. INDICATORS
// ═══════════════════════════════════════════════
function ema(arr,period){
  if(!arr||arr.length<period)return null;
  const k=2/(period+1);
  let e=arr.slice(0,period).reduce((s,x)=>s+x,0)/period;
  for(let i=period;i<arr.length;i++)e=arr[i]*k+e*(1-k);
  return e;
}
function emaSeries(closes,period){
  const out=[];
  if(!closes||closes.length<period)return out;
  const k=2/(period+1);
  let e=closes.slice(0,period).reduce((s,x)=>s+x,0)/period;
  for(let i=period;i<closes.length;i++){
    e=closes[i]*k+e*(1-k);
    out.push(e);
  }
  return out;
}
function rsi(closes,period=14){
  if(!closes||closes.length<period+1)return null;
  const out=[];
  let gains=0,losses=0;
  for(let i=1;i<=period;i++){
    const d=closes[i]-closes[i-1];
    if(d>=0)gains+=d;else losses-=d;
  }
  let avgG=gains/period,avgL=losses/period;
  out.push(avgL===0?100:100-100/(1+avgG/avgL));
  for(let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    const g=d>=0?d:0,l=d<0?-d:0;
    avgG=(avgG*(period-1)+g)/period;
    avgL=(avgL*(period-1)+l)/period;
    out.push(avgL===0?100:100-100/(1+avgG/avgL));
  }
  return out;
}
function macd(closes,fast=12,slow=26,sig=9){
  if(!closes||closes.length<slow+sig)return null;
  const ef=emaSeries(closes,fast),es=emaSeries(closes,slow);
  // align lengths
  const offset=slow-fast;
  const macdLine=es.map((v,i)=>ef[i+offset]-v);
  const signalLine=emaSeries(macdLine,sig);
  const offset2=sig-1;
  const hist=signalLine.map((v,i)=>macdLine[i+offset2]-v);
  return {macd:macdLine,signal:signalLine,hist,
    lastMacd:macdLine[macdLine.length-1],
    lastSig:signalLine[signalLine.length-1],
    lastHist:hist[hist.length-1],
    prevHist:hist[hist.length-2]};
}
function adx(candles,period=14){
  if(!candles||candles.length<period*2)return null;
  const tr=[],plusDM=[],minusDM=[];
  for(let i=1;i<candles.length;i++){
    const c=candles[i],p=candles[i-1];
    const t=Math.max(c.high-c.low,Math.abs(c.high-p.close),Math.abs(c.low-p.close));
    tr.push(t);
    const up=c.high-p.high,dn=p.low-c.low;
    plusDM.push(up>dn&&up>0?up:0);
    minusDM.push(dn>up&&dn>0?dn:0);
  }
  // smooth
  const smooth=(arr)=>{
    const out=[];
    let s=arr.slice(0,period).reduce((a,b)=>a+b,0);
    out.push(s);
    for(let i=period;i<arr.length;i++){
      s=s-s/period+arr[i];
      out.push(s);
    }
    return out;
  };
  const sTR=smooth(tr),sPlus=smooth(plusDM),sMinus=smooth(minusDM);
  const plusDI=sPlus.map((v,i)=>100*v/sTR[i]);
  const minusDI=sMinus.map((v,i)=>100*v/sTR[i]);
  const dx=plusDI.map((v,i)=>{const m=minusDI[i];return 100*Math.abs(v-m)/Math.max(v+m,0.0001);});
  const adxArr=[];
  let a=dx.slice(0,period).reduce((s,v)=>s+v,0)/period;
  adxArr.push(a);
  for(let i=period;i<dx.length;i++){
    a=(a*(period-1)+dx[i])/period;
    adxArr.push(a);
  }
  return {plusDI,minusDI,adx:adxArr,
    lastADX:adxArr[adxArr.length-1],
    lastPlus:plusDI[plusDI.length-1],
    lastMinus:minusDI[minusDI.length-1],
    plusDISeries:plusDI,minusDISeries:minusDI};
}
function stoch(candles,kPeriod=14,dPeriod=3,smooth=3){
  if(!candles||candles.length<kPeriod+dPeriod)return null;
  const rawK=[];
  for(let i=kPeriod-1;i<candles.length;i++){
    const slice=candles.slice(i-kPeriod+1,i+1);
    const hi=Math.max(...slice.map(c=>c.high));
    const lo=Math.min(...slice.map(c=>c.low));
    const c=candles[i].close;
    rawK.push(hi===lo?50:100*(c-lo)/(hi-lo));
  }
  // smooth K
  const k=[];
  for(let i=smooth-1;i<rawK.length;i++){
    let s=0;for(let j=0;j<smooth;j++)s+=rawK[i-j];
    k.push(s/smooth);
  }
  // D = SMA of K
  const d=[];
  for(let i=dPeriod-1;i<k.length;i++){
    let s=0;for(let j=0;j<dPeriod;j++)s+=k[i-j];
    d.push(s/dPeriod);
  }
  return {k,d,
    lastK:k[k.length-1],lastD:d[d.length-1],
    prevK:k[k.length-2],prevD:d[d.length-2]};
}
function vwapSession(candles){
  if(!candles||!candles.length)return null;
  let dayKey=null,cumPV=0,cumV=0,cumPV2=0;
  const out=[];
  for(const c of candles){
    const d=new Date(c.time*1000);
    const key=d.getUTCFullYear()+'-'+d.getUTCMonth()+'-'+d.getUTCDate();
    if(key!==dayKey){dayKey=key;cumPV=0;cumV=0;cumPV2=0;}
    const tp=(c.high+c.low+c.close)/3;
    const v=c.volume||0;
    cumPV+=tp*v;cumV+=v;cumPV2+=v*tp*tp;
    if(cumV<=0){out.push({time:c.time,vwap:tp,u1:tp,l1:tp});continue;}
    const vw=cumPV/cumV;
    const sd=Math.sqrt(Math.max(0,cumPV2/cumV-vw*vw));
    out.push({time:c.time,vwap:vw,u1:vw+sd,l1:vw-sd});
  }
  // slope: last 10 vs current
  let slope=0;
  if(out.length>11){
    const last=out[out.length-1].vwap,prev=out[out.length-11].vwap;
    if(prev)slope=(last-prev)/prev*100;
  }
  return {series:out,last:out[out.length-1],slope};
}

// 4. SCALPING SIGNAL ENGINE — 100점 시스템
// ═══════════════════════════════════════════════

// ── ZigZag 파동 추출 ──
function zigzag(candles,depth=5,pctThreshold=0.3){
  if(!candles||candles.length<depth*2)return [];
  const pivots=[];
  let dir=0,lastIdx=0,lastPrice=candles[0].close;
  for(let i=1;i<candles.length;i++){
    const c=candles[i];
    const pct=(c.high-lastPrice)/lastPrice*100;
    const pctDn=(lastPrice-c.low)/lastPrice*100;
    if(dir>=0&&pctDn>=pctThreshold){
      pivots.push({idx:lastIdx,price:lastPrice,type:'high',time:candles[lastIdx].time});
      dir=-1;lastIdx=i;lastPrice=c.low;
    } else if(dir<=0&&pct>=pctThreshold){
      pivots.push({idx:lastIdx,price:lastPrice,type:'low',time:candles[lastIdx].time});
      dir=1;lastIdx=i;lastPrice=c.high;
    } else {
      if(dir>=0&&c.high>lastPrice){lastIdx=i;lastPrice=c.high;}
      if(dir<=0&&c.low<lastPrice){lastIdx=i;lastPrice=c.low;}
    }
  }
  pivots.push({idx:lastIdx,price:lastPrice,type:dir>=0?'high':'low',time:candles[lastIdx].time});
  return pivots;
}

// ── 엘리엇 파동 추정 + 피보나치 ──
function elliottFib(candles){
  const pivots=zigzag(candles,5,0.4);
  if(pivots.length<3)return null;
  // 최근 2개 피벗으로 마지막 파동 정의
  const last=pivots[pivots.length-1];
  const prev=pivots[pivots.length-2];
  const isUp=last.price>prev.price;
  const hi=Math.max(last.price,prev.price);
  const lo=Math.min(last.price,prev.price);
  const diff=hi-lo;
  // 파동 추정 (단순)
  let waveLabel='조정파',waveNum='?';
  if(pivots.length>=5){
    const w=pivots.slice(-5);
    const lengths=[];
    for(let i=1;i<w.length;i++)lengths.push(Math.abs(w[i].price-w[i-1].price));
    // 3파가 가장 길면 임펄스
    if(lengths[2]>lengths[0]&&lengths[2]>lengths[4]){
      waveLabel='임펄스 5파';waveNum='5';
    } else if(lengths.length>=3){
      waveLabel='조정 ABC';waveNum='C';
    }
  }
  // 피보 레벨 (역추세 되돌림)
  const levels={
    0:isUp?lo:hi,
    0.236:isUp?(hi-diff*0.236):(lo+diff*0.236),
    0.382:isUp?(hi-diff*0.382):(lo+diff*0.382),
    0.5:isUp?(hi-diff*0.5):(lo+diff*0.5),
    0.618:isUp?(hi-diff*0.618):(lo+diff*0.618),
    0.786:isUp?(hi-diff*0.786):(lo+diff*0.786),
    1.0:isUp?lo:hi,
    1.272:isUp?(hi+diff*0.272):(lo-diff*0.272),
    1.618:isUp?(hi+diff*0.618):(lo-diff*0.618),
  };
  return {pivots,isUp,hi,lo,diff,levels,waveLabel,waveNum,
    lastPivot:last,prevPivot:prev};
}

// ── Volume Profile POC ──
function volumeProfile(candles,bins=24){
  if(!candles||candles.length<10)return null;
  const sl=candles.slice(-120);
  const hi=Math.max(...sl.map(c=>c.high));
  const lo=Math.min(...sl.map(c=>c.low));
  if(hi===lo)return null;
  const step=(hi-lo)/bins;
  const bk=Array.from({length:bins},(_,i)=>({price:lo+i*step+step/2,vol:0}));
  sl.forEach(c=>{
    const tp=(c.high+c.low+c.close)/3;
    const idx=Math.min(Math.floor((tp-lo)/step),bins-1);
    if(idx>=0)bk[idx].vol+=c.volume||0;
  });
  const maxV=Math.max(...bk.map(b=>b.vol));
  const poc=bk.reduce((a,b)=>b.vol>a.vol?b:a);
  const total=bk.reduce((s,b)=>s+b.vol,0);
  const sorted=[...bk].sort((a,b)=>b.vol-a.vol);
  let cum=0;const va=new Set();
  for(const b of sorted){cum+=b.vol;va.add(b.price);if(cum/total>=0.7)break;}
  const vaArr=bk.filter(b=>va.has(b.price));
  return {poc:poc.price,vah:Math.max(...vaArr.map(b=>b.price)),val:Math.min(...vaArr.map(b=>b.price)),maxV,bk};
}

// ── 전일 고저 ──
function prevDayHL(candles1d){
  if(!candles1d||candles1d.length<2)return null;
  const prev=candles1d[candles1d.length-2];
  return {high:prev.high,low:prev.low,close:prev.close};
}

// ── 다중 TF ADX 가중 점수 ──
function multiADXScore(adx5,adx15,adx1h,dirSign){
  // dirSign: +1 for long, -1 for short
  let score=0;
  const details=[];
  if(adx5){
    const ok=adx5.lastADX>25;
    if(ok)score+=5;
    details.push({tf:'5m',adx:adx5.lastADX,ok,pts:ok?5:0});
  }
  if(adx15){
    const ok=adx15.lastADX>25;
    if(ok)score+=5;
    details.push({tf:'15m',adx:adx15.lastADX,ok,pts:ok?5:0});
  }
  if(adx1h){
    const ok=adx1h.lastADX>25;
    if(ok)score+=10;
    details.push({tf:'1h',adx:adx1h.lastADX,ok,pts:ok?10:0});
  }
  // 추세 일치 보너스
  const allLong=[adx5,adx15,adx1h].filter(a=>a).every(a=>a.lastPlus>a.lastMinus);
  const allShort=[adx5,adx15,adx1h].filter(a=>a).every(a=>a.lastMinus>a.lastPlus);
  let bonus=0;
  if(dirSign>0&&allLong){score+=5;bonus=5;}
  else if(dirSign<0&&allShort){score+=5;bonus=5;}
  return {score,details,bonus,allLong,allShort};
}

// ── 백테스트 (간단 통계) ──
function backtest(candles5m){
  if(!candles5m||candles5m.length<200)return null;
  const closes=candles5m.map(c=>c.close);
  const r=rsi(closes,14);
  const st1=stoch(candles5m,5,3,3);
  const st2=stoch(candles5m,14,3,3);
  if(!r||!st1||!st2)return null;
  // 과매도+골든 발생 시점들 찾기
  let longSignals=0,longWins=0,shortSignals=0,shortWins=0;
  const offR=candles5m.length-r.length;
  const offS=candles5m.length-st1.k.length;
  for(let i=20;i<candles5m.length-12;i++){
    const ri=i-offR,si=i-offS;
    if(ri<1||si<1)continue;
    const rsiV=r[ri];
    const k1=st1.k[si],d1=st1.d[si];
    const pk1=st1.k[si-1],pd1=st1.d[si-1];
    // 롱 신호: 과매도 + 골든
    if(rsiV<35&&k1<25&&k1>d1&&pk1<=pd1){
      longSignals++;
      const ep=candles5m[i].close;
      const futureMax=Math.max(...candles5m.slice(i+1,i+13).map(c=>c.high));
      const futureMin=Math.min(...candles5m.slice(i+1,i+13).map(c=>c.low));
      // TP +0.3% 먼저 vs SL -0.2%
      if((futureMax-ep)/ep>=0.003)longWins++;
    }
    // 숏 신호
    if(rsiV>65&&k1>75&&k1<d1&&pk1>=pd1){
      shortSignals++;
      const ep=candles5m[i].close;
      const futureMin=Math.min(...candles5m.slice(i+1,i+13).map(c=>c.low));
      if((ep-futureMin)/ep>=0.003)shortWins++;
    }
  }
  return {
    longWinRate:longSignals>0?Math.round(longWins/longSignals*100):0,
    longCount:longSignals,
    shortWinRate:shortSignals>0?Math.round(shortWins/shortSignals*100):0,
    shortCount:shortSignals,
  };
}

// ── 100점 점수 시스템 ──
function calcSignal100(data5m,data15m,data1h,data1d){
  if(!data5m||data5m.length<60)return null;
  const closes5=data5m.map(c=>c.close);
  const closes1h=data1h?data1h.map(c=>c.close):[];
  const price=closes5[closes5.length-1];

  // 지표 계산
  const adx5=adx(data5m,14);
  const adx15=data15m?adx(data15m,14):null;
  const adx1h=data1h?adx(data1h,14):null;
  const r5=rsi(closes5,14);
  const lastRSI=r5?r5[r5.length-1]:50;
  const prevRSI=r5?r5[r5.length-2]:50;
  const st1=stoch(data5m,5,3,3);
  const st2=stoch(data5m,14,3,3);
  const st3=stoch(data5m,21,7,7);
  const m=macd(closes5);
  const ema20_1h=data1h?ema(closes1h,20):null;
  const ema60_1h=data1h&&closes1h.length>=60?ema(closes1h,60):null;
  const ema200_1h=data1h&&closes1h.length>=200?ema(closes1h,200):null;
  const elliott=data1h?elliottFib(data1h):null;
  const vp=data1h?volumeProfile(data1h):null;
  const pdh=data1d?prevDayHL(data1d):null;
  const bt=backtest(data5m);

  // ── 차단 필터 ──
  const adx1hVal=adx1h?adx1h.lastADX:0;
  const sideways=adx1hVal<20;

  // ── 트리플 크로스 감지 ──
  const detectCross=(s)=>{
    if(!s||s.k.length<4)return null;
    const recent=Math.min(3,s.k.length-1);
    for(let i=s.k.length-recent;i<s.k.length;i++){
      const cur=s.k[i]-s.d[i],prev=s.k[i-1]-s.d[i-1];
      if(cur>0&&prev<=0)return {type:'golden',kVal:s.k[i]};
      if(cur<0&&prev>=0)return {type:'dead',kVal:s.k[i]};
    }
    return null;
  };
  const cr1=detectCross(st1),cr2=detectCross(st2),cr3=detectCross(st3);
  const tripleGolden=cr1?.type==='golden'&&cr2?.type==='golden'&&cr3?.type==='golden';
  const tripleDead=cr1?.type==='dead'&&cr2?.type==='dead'&&cr3?.type==='dead';
  const tripleGoldenLow=tripleGolden&&(cr1.kVal<30||cr2.kVal<30);
  const tripleDeadHigh=tripleDead&&(cr1.kVal>70||cr2.kVal>70);

  // ════════════════════════
  // 롱 점수 계산
  // ════════════════════════
  let longScore=0;
  const longBreakdown={dmi:0,ema:0,stoch:0,rsi:0,macd:0};
  const longChecks=[];

  // A. DMI/ADX (25점) - 멀티TF
  const dmiL=multiADXScore(adx5,adx15,adx1h,1);
  longBreakdown.dmi=dmiL.score;
  longScore+=dmiL.score;
  longChecks.push({lbl:'DMI/ADX 멀티TF',val:`${dmiL.score}/25`,ok:dmiL.score>=15});

  // B. 1H EMA 지지 (15점)
  let emaScore=0;
  if(ema20_1h){
    const dist=(price-ema20_1h)/ema20_1h*100;
    if(price>ema20_1h&&Math.abs(dist)<0.5)emaScore+=10;
    else if(price>ema20_1h)emaScore+=5;
  }
  if(ema60_1h&&ema20_1h&&ema20_1h>ema60_1h)emaScore+=3;
  if(ema200_1h&&price>ema200_1h)emaScore+=2;
  longBreakdown.ema=emaScore;
  longScore+=emaScore;
  longChecks.push({lbl:'1H EMA 지지',val:`${emaScore}/15`,ok:emaScore>=8});

  // C. 5M 스토 과매도/크로스 (30점)
  let stochScore=0;
  if(tripleGoldenLow)stochScore+=20;
  else if(tripleGolden)stochScore+=13;
  if(st1&&st1.lastK<20)stochScore+=8;
  else if(st1&&st1.lastK<30)stochScore+=5;
  if(st2&&st2.lastK<25)stochScore+=4;
  if(st3&&st3.lastK<30)stochScore+=2;
  stochScore=Math.min(stochScore,30);
  longBreakdown.stoch=stochScore;
  longScore+=stochScore;
  longChecks.push({lbl:'스토 과매도/골든',val:`${stochScore}/30`,ok:stochScore>=15});

  // D. 5M RSI 과매도 (20점)
  let rsiScore=0;
  if(lastRSI<25)rsiScore=20;
  else if(lastRSI<30)rsiScore=16;
  else if(lastRSI<40)rsiScore=10;
  else if(lastRSI<50&&lastRSI>prevRSI)rsiScore=4;
  if(lastRSI>70)rsiScore=-12;
  if(lastRSI>80)rsiScore=-20;
  longBreakdown.rsi=rsiScore;
  longScore+=rsiScore;
  longChecks.push({lbl:'RSI '+lastRSI.toFixed(1),val:`${rsiScore}/20`,ok:rsiScore>=8});

  // E. MACD (10점)
  let macdScore=0;
  if(m){
    if(m.lastMacd>m.lastSig&&m.prevHist<=0&&m.lastHist>0)macdScore+=7;
    else if(m.lastHist>0&&m.prevHist<=0)macdScore+=5;
    else if(m.lastHist>0&&m.lastHist>m.prevHist)macdScore+=3;
  }
  longBreakdown.macd=macdScore;
  longScore+=macdScore;
  longChecks.push({lbl:'MACD',val:`${macdScore}/10`,ok:macdScore>=3});

  // 차단 조건
  let longBlocked=false;
  if(sideways){longBlocked=true;longScore=0;}
  if(adx1h&&adx1h.lastMinus>adx1h.lastPlus){longBlocked=true;longScore=Math.min(longScore,30);}

  // ════════════════════════
  // 숏 점수 계산
  // ════════════════════════
  let shortScore=0;
  const shortBreakdown={dmi:0,ema:0,stoch:0,rsi:0,macd:0};
  const shortChecks=[];

  // A. DMI/ADX (25점)
  const dmiS=multiADXScore(adx5,adx15,adx1h,-1);
  shortBreakdown.dmi=dmiS.score;
  shortScore+=dmiS.score;
  shortChecks.push({lbl:'DMI/ADX 멀티TF',val:`${dmiS.score}/25`,ok:dmiS.score>=15});

  // B. 1H EMA 저항 (15점)
  let emaScoreS=0;
  if(ema20_1h){
    const dist=(ema20_1h-price)/ema20_1h*100;
    if(price<ema20_1h&&Math.abs(dist)<0.5)emaScoreS+=10;
    else if(price<ema20_1h)emaScoreS+=5;
  }
  if(ema60_1h&&ema20_1h&&ema20_1h<ema60_1h)emaScoreS+=3;
  if(ema200_1h&&price<ema200_1h)emaScoreS+=2;
  shortBreakdown.ema=emaScoreS;
  shortScore+=emaScoreS;
  shortChecks.push({lbl:'1H EMA 저항',val:`${emaScoreS}/15`,ok:emaScoreS>=8});

  // C. 5M 스토 과매수/데드 (30점)
  let stochScoreS=0;
  if(tripleDeadHigh)stochScoreS+=20;
  else if(tripleDead)stochScoreS+=13;
  if(st1&&st1.lastK>80)stochScoreS+=8;
  else if(st1&&st1.lastK>70)stochScoreS+=5;
  if(st2&&st2.lastK>75)stochScoreS+=4;
  if(st3&&st3.lastK>70)stochScoreS+=2;
  stochScoreS=Math.min(stochScoreS,30);
  shortBreakdown.stoch=stochScoreS;
  shortScore+=stochScoreS;
  shortChecks.push({lbl:'스토 과매수/데드',val:`${stochScoreS}/30`,ok:stochScoreS>=15});

  // D. 5M RSI 과매수 (20점)
  let rsiScoreS=0;
  if(lastRSI>75)rsiScoreS=20;
  else if(lastRSI>70)rsiScoreS=16;
  else if(lastRSI>60)rsiScoreS=10;
  else if(lastRSI>50&&lastRSI<prevRSI)rsiScoreS=4;
  if(lastRSI<30)rsiScoreS=-12;
  if(lastRSI<20)rsiScoreS=-20;
  shortBreakdown.rsi=rsiScoreS;
  shortScore+=rsiScoreS;
  shortChecks.push({lbl:'RSI '+lastRSI.toFixed(1),val:`${rsiScoreS}/20`,ok:rsiScoreS>=8});

  // E. MACD (10점)
  let macdScoreS=0;
  if(m){
    if(m.lastMacd<m.lastSig&&m.prevHist>=0&&m.lastHist<0)macdScoreS+=7;
    else if(m.lastHist<0&&m.prevHist>=0)macdScoreS+=5;
    else if(m.lastHist<0&&m.lastHist<m.prevHist)macdScoreS+=3;
  }
  shortBreakdown.macd=macdScoreS;
  shortScore+=macdScoreS;
  shortChecks.push({lbl:'MACD',val:`${macdScoreS}/10`,ok:macdScoreS>=3});

  // 차단
  let shortBlocked=false;
  if(sideways){shortBlocked=true;shortScore=0;}
  if(adx1h&&adx1h.lastPlus>adx1h.lastMinus){shortBlocked=true;shortScore=Math.min(shortScore,30);}

  longScore=Math.max(0,Math.min(100,Math.round(longScore)));
  shortScore=Math.max(0,Math.min(100,Math.round(shortScore)));

  // 최종 방향
  const diff=Math.abs(longScore-shortScore);
  const dir=diff<10?'wait':longScore>shortScore?'long':'short';
  const score=Math.max(longScore,shortScore);
  const checks=dir==='short'?shortChecks:longChecks;
  const breakdown=dir==='short'?shortBreakdown:longBreakdown;

  // 진입 플랜
  const plan={
    entry:price,
    tp1:dir==='long'?price*1.0015:dir==='short'?price*0.9985:price,
    tp2:dir==='long'?price*1.0030:dir==='short'?price*0.9970:price,
    tp3:dir==='long'?price*1.0050:dir==='short'?price*0.9950:price,
    sl:dir==='long'?price*0.9988:dir==='short'?price*1.0012:price,
    rr:'1:1.25',
  };

  return {
    score,dir,checks,plan,
    longScore,shortScore,longBreakdown,shortBreakdown,
    longBlocked,shortBlocked,sideways,
    tripleGolden,tripleDead,tripleGoldenLow,tripleDeadHigh,
    indicators:{
      rsi:r5,macd:m,adx:adx5,adx15,adx1h,st1,st2,st3,
      ema20_1h,ema60_1h,ema200_1h,
      elliott,vp,pdh,
      vw:vwapSession(data5m),
    },
    backtest:bt,
  };
}

const DARK_OPT={
  layout:{background:{type:'Solid',color:'#0a0e14'},textColor:'#8a94a8'},
  grid:{vertLines:{color:'rgba(42,49,66,0.4)'},horzLines:{color:'rgba(42,49,66,0.4)'}},
  rightPriceScale:{borderColor:'#2a3142'},
  timeScale:{borderColor:'#2a3142',timeVisible:true,secondsVisible:false},
  crosshair:{mode:1},
};
const IND_OPT={...DARK_OPT,timeScale:{...DARK_OPT.timeScale,visible:false},rightPriceScale:{...DARK_OPT.rightPriceScale,scaleMargins:{top:0.1,bottom:0.1}}};

function initCharts(){
  // 메인 차트는 TradingView 위젯이 담당 (initTV에서 처리)

  // 보조 차트
  const setupInd=(id,key,opts)=>{
    const el=document.getElementById(id);
    const c=LightweightCharts.createChart(el,{...IND_OPT,width:el.offsetWidth,height:el.offsetHeight});
    S.charts[key]=c;
    new ResizeObserver(es=>{for(const e of es)c.resize(e.contentRect.width,e.contentRect.height);}).observe(el);
    return c;
  };

  // RSI
  const cRsi=setupInd('ind-rsi','rsi');
  S.series.rsi=cRsi.addLineSeries({color:'#a371f7',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false});

  // MACD
  const cMacd=setupInd('ind-macd','macd');
  S.series.macdHist=cMacd.addHistogramSeries({color:'#5b9eff',priceLineVisible:false,lastValueVisible:false});
  S.series.macdLine=cMacd.addLineSeries({color:'#0fd66f',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
  S.series.macdSig=cMacd.addLineSeries({color:'#ff4b6e',lineWidth:1,priceLineVisible:false,lastValueVisible:false});

  // ADX
  const cAdx=setupInd('ind-adx','adx');
  S.series.adxLine=cAdx.addLineSeries({color:'#ffa726',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false});
  S.series.plusDI=cAdx.addLineSeries({color:'#0fd66f',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
  S.series.minusDI=cAdx.addLineSeries({color:'#ff4b6e',lineWidth:1,priceLineVisible:false,lastValueVisible:false});

  // Stoch x3
  ['st1','st2','st3'].forEach(k=>{
    const c=setupInd('ind-'+k,k);
    S.series[k+'K']=c.addLineSeries({color:'#5b9eff',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false});
    S.series[k+'D']=c.addLineSeries({color:'#ffa726',lineWidth:1,priceLineVisible:false,lastValueVisible:false});
    // 기준선 (20, 80)
    const refHi=c.addLineSeries({color:'rgba(255,75,110,0.25)',lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false,lineStyle:LightweightCharts.LineStyle.Dashed});
    const refLo=c.addLineSeries({color:'rgba(15,214,111,0.25)',lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false,lineStyle:LightweightCharts.LineStyle.Dashed});
    S.series[k+'_refHi']=refHi;
    S.series[k+'_refLo']=refLo;
  });

  // 미니 차트 (1H, 15M)
  ['mini-1h','mini-15m'].forEach(id=>{
    const el=document.getElementById(id);
    const c=LightweightCharts.createChart(el,{...DARK_OPT,width:el.offsetWidth,height:el.offsetHeight,timeScale:{...DARK_OPT.timeScale,visible:false}});
    const cs=c.addCandlestickSeries({upColor:'#0fd66f',downColor:'#ff4b6e',borderUpColor:'#0fd66f',borderDownColor:'#ff4b6e',wickUpColor:'#0fd66f',wickDownColor:'#ff4b6e'});
    S.charts[id]=c;S.series[id+'_candle']=cs;
    new ResizeObserver(es=>{for(const e of es)c.resize(e.contentRect.width,e.contentRect.height);}).observe(el);
  });

  // 미니 RSI 차트
  ['mini-1h-rsi','mini-15m-rsi'].forEach(id=>{
    const el=document.getElementById(id);
    const c=LightweightCharts.createChart(el,{...IND_OPT,width:el.offsetWidth,height:el.offsetHeight});
    const ln=c.addLineSeries({color:'#a371f7',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false});
    const refHi=c.addLineSeries({color:'rgba(255,75,110,0.25)',lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false,lineStyle:LightweightCharts.LineStyle.Dashed});
    const refLo=c.addLineSeries({color:'rgba(15,214,111,0.25)',lineWidth:1,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false,lineStyle:LightweightCharts.LineStyle.Dashed});
    S.charts[id]=c;S.series[id]=ln;S.series[id+'_refHi']=refHi;S.series[id+'_refLo']=refLo;
    new ResizeObserver(es=>{for(const e of es)c.resize(e.contentRect.width,e.contentRect.height);}).observe(el);
  });

  // ── 보조지표 6개 시간축 동기화 ──
  const indKeys=['rsi','macd','adx','st1','st2','st3'];
  let syncing=false;
  indKeys.forEach(srcKey=>{
    const srcChart=S.charts[srcKey];
    if(!srcChart)return;
    srcChart.timeScale().subscribeVisibleLogicalRangeChange(range=>{
      if(syncing||!range)return;
      syncing=true;
      indKeys.forEach(dstKey=>{
        if(dstKey===srcKey)return;
        const dst=S.charts[dstKey];
        if(dst)try{dst.timeScale().setVisibleLogicalRange(range);}catch(e){}
      });
      syncing=false;
    });
    // 십자선 동기화
    srcChart.subscribeCrosshairMove(param=>{
      if(syncing)return;
      syncing=true;
      indKeys.forEach(dstKey=>{
        if(dstKey===srcKey)return;
        const dst=S.charts[dstKey];
        if(dst&&param.time){
          try{dst.setCrosshairPosition(NaN,param.time,S.series[dstKey]||S.series[dstKey+'K']);}catch(e){}
        } else if(dst){
          try{dst.clearCrosshairPosition();}catch(e){}
        }
      });
      syncing=false;
    });
  });
}

async function loadKlines(symbol,tf,limit=500){
  try{
    const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${tf}&limit=${limit}`);
    const d=await r.json();
    if(!Array.isArray(d))throw new Error('bad data');
    return d.map(x=>({time:Math.floor(x[0]/1000),open:+x[1],high:+x[2],low:+x[3],close:+x[4],volume:+x[5]}));
  }catch(e){logErr('loadKlines',e);return [];}
}

async function refreshAll(){
  // 메인 5분, 보조 15분/1시간/일봉 동시 로드
  const [c5,c15,c1h,c1d]=await Promise.all([
    loadKlines(S.coin,S.tf,500),
    loadKlines(S.coin,'15m',300),

function drawMiniChart(id,candles,tf,candles1d){
  try{
    if(!candles||!candles.length)return;
    const cs=S.series[id+'_candle'];
    if(cs)cs.setData(candles);

    // VWAP 흰색 선
    const vw=vwapSession(candles);
    if(vw&&vw.series.length){
      if(S.series[id+'_vwap'])try{S.charts[id].removeSeries(S.series[id+'_vwap']);}catch(e){}
      const v=S.charts[id].addLineSeries({color:'#ffffff',lineWidth:1.5,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false});
      v.setData(vw.series.map(d=>({time:d.time,value:d.vwap})));
      S.series[id+'_vwap']=v;
    }

    // 전일 고저 얇은 점선
    if(candles1d&&candles1d.length>=2){
      const pd=prevDayHL(candles1d);
      if(pd){
        if(S.series[id+'_pdh'])try{cs.removePriceLine(S.series[id+'_pdh']);}catch(e){}
        if(S.series[id+'_pdl'])try{cs.removePriceLine(S.series[id+'_pdl']);}catch(e){}
        S.series[id+'_pdh']=cs.createPriceLine({price:pd.high,color:'rgba(255,75,110,0.55)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dotted,axisLabelVisible:false,title:''});
        S.series[id+'_pdl']=cs.createPriceLine({price:pd.low,color:'rgba(15,214,111,0.55)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dotted,axisLabelVisible:false,title:''});
      }
    }

    // 매물대 POC (반투명 가로선)
    const vp=volumeProfile(candles);
    if(vp){
      if(S.series[id+'_poc'])try{cs.removePriceLine(S.series[id+'_poc']);}catch(e){}
      if(S.series[id+'_vah'])try{cs.removePriceLine(S.series[id+'_vah']);}catch(e){}
      if(S.series[id+'_val'])try{cs.removePriceLine(S.series[id+'_val']);}catch(e){}
      S.series[id+'_poc']=cs.createPriceLine({price:vp.poc,color:'rgba(255,167,38,0.7)',lineWidth:2,lineStyle:LightweightCharts.LineStyle.Solid,axisLabelVisible:false,title:''});
      S.series[id+'_vah']=cs.createPriceLine({price:vp.vah,color:'rgba(255,167,38,0.35)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dotted,axisLabelVisible:false,title:''});
      S.series[id+'_val']=cs.createPriceLine({price:vp.val,color:'rgba(255,167,38,0.35)',lineWidth:1,lineStyle:LightweightCharts.LineStyle.Dotted,axisLabelVisible:false,title:''});
    }

    // RSI
    const rsiKey=id+'-rsi';
    const closes=candles.map(c=>c.close);
    const rsiArr=rsi(closes,14);
    if(rsiArr&&S.series[rsiKey]){
      const off=candles.length-rsiArr.length;
      const data=rsiArr.map((v,i)=>({time:candles[i+off].time,value:v}));
      S.series[rsiKey].setData(data);
      if(data.length){
        const t0=data[0].time,tN=data[data.length-1].time;
        S.series[rsiKey+'_refHi'].setData([{time:t0,value:70},{time:tN,value:70}]);
        S.series[rsiKey+'_refLo'].setData([{time:t0,value:30},{time:tN,value:30}]);
      }
      const last=rsiArr[rsiArr.length-1];
      const vEl=document.getElementById('v-'+rsiKey);
      if(vEl)vEl.textContent=last.toFixed(1);
    }
  }catch(e){logErr('mini '+id,e);}
}

function drawIndicators(sig,candles){
  const times=candles.map(c=>c.time);
  // RSI
  if(sig.indicators.rsi){
    const off=candles.length-sig.indicators.rsi.length;
    S.series.rsi.setData(sig.indicators.rsi.map((v,i)=>({time:times[i+off],value:v})));
  }
  // MACD
  if(sig.indicators.macd){
    const m=sig.indicators.macd;
    const off=candles.length-m.macd.length;
    S.series.macdLine.setData(m.macd.map((v,i)=>({time:times[i+off],value:v})));
    const offS=candles.length-m.signal.length;
    S.series.macdSig.setData(m.signal.map((v,i)=>({time:times[i+offS],value:v})));
    const offH=candles.length-m.hist.length;
    S.series.macdHist.setData(m.hist.map((v,i)=>({time:times[i+offH],value:v,color:v>=0?'rgba(15,214,111,0.6)':'rgba(255,75,110,0.6)'})));
  }
  // ADX
  if(sig.indicators.adx){
    const a=sig.indicators.adx;
    const off=candles.length-a.adx.length;
    S.series.adxLine.setData(a.adx.map((v,i)=>({time:times[i+off],value:v})));
    const offD=candles.length-a.plusDISeries.length;
    S.series.plusDI.setData(a.plusDISeries.map((v,i)=>({time:times[i+offD],value:v})));
    S.series.minusDI.setData(a.minusDISeries.map((v,i)=>({time:times[i+offD],value:v})));
  }
  // Stoch x3 + 트리플 크로스 감지
  const stochInfo={};
  [['st1',sig.indicators.st1],['st2',sig.indicators.st2],['st3',sig.indicators.st3]].forEach(([k,s])=>{
    if(!s)return;
    const offK=candles.length-s.k.length;
    S.series[k+'K'].setData(s.k.map((v,i)=>({time:times[i+offK],value:v})));
    const offD=candles.length-s.d.length;
    S.series[k+'D'].setData(s.d.map((v,i)=>({time:times[i+offD],value:v})));
    // 기준선
    if(times.length){
      S.series[k+'_refHi'].setData([{time:times[0],value:80},{time:times[times.length-1],value:80}]);
      S.series[k+'_refLo'].setData([{time:times[0],value:20},{time:times[times.length-1],value:20}]);
    }
    // K-D 크로스 시퀀스 (최근 5봉 내 크로스)
    const crosses=[];
    for(let i=Math.max(1,s.k.length-5);i<s.k.length;i++){
      const cur=s.k[i]-s.d[i],prev=s.k[i-1]-s.d[i-1];
      if(cur>0&&prev<=0)crosses.push({type:'golden',idx:i,time:times[i+offK]});
      else if(cur<0&&prev>=0)crosses.push({type:'dead',idx:i,time:times[i+offK]});
    }
    stochInfo[k]=crosses;
  });

  // 트리플 크로스 감지: 3개 스토 모두 최근 3봉 내 같은 방향 크로스
  detectTripleCross(stochInfo,candles);
}

function detectTripleCross(stochInfo,candles){
  if(!stochInfo.st1||!stochInfo.st2||!stochInfo.st3)return;
  const banner=document.getElementById('triple-banner');
  if(!banner)return;
  const recentBars=candles.slice(-3).map(c=>c.time);
  const recentSet=new Set(recentBars);

  const isCrossNearby=(crosses,type)=>crosses.some(c=>c.type===type&&recentSet.has(c.time));
  const allGolden=isCrossNearby(stochInfo.st1,'golden')&&isCrossNearby(stochInfo.st2,'golden')&&isCrossNearby(stochInfo.st3,'golden');
  const allDead=isCrossNearby(stochInfo.st1,'dead')&&isCrossNearby(stochInfo.st2,'dead')&&isCrossNearby(stochInfo.st3,'dead');

  if(allGolden){
    banner.style.display='block';
    banner.className='long';
    banner.textContent='🚀 TRIPLE GOLDEN CROSS — 강한 롱 시그널';
    applyStochBackground('golden');
  } else if(allDead){
    banner.style.display='block';
    banner.className='short';
    banner.textContent='💥 TRIPLE DEAD CROSS — 강한 숏 시그널';
    applyStochBackground('dead');
  } else {
    banner.style.display='none';
    applyStochBackground(null);
  }
}

function applyStochBackground(type){
  ['st1','st2','st3'].forEach(k=>{
    const c=S.charts[k];
    if(!c)return;
    let bg='#0a0e14';
    if(type==='golden')bg='#0e2419';
    else if(type==='dead')bg='#2a0e15';
    try{c.applyOptions({layout:{background:{type:'Solid',color:bg}}});}catch(e){}
  });
}

        <div style="font-size:10px;color:var(--tx2);font-weight:700;">롱 점수</div>
        <div style="font-size:22px;font-weight:900;color:var(--gn);">${sig.longScore}</div>
        ${sig.backtest&&sig.backtest.longCount>0?`<div style="font-size:10px;color:var(--tx2);">백테 ${sig.backtest.longWinRate}% (${sig.backtest.longCount}회)</div>`:'<div style="font-size:9px;color:var(--tx3);">백테 N/A</div>'}
        ${sig.longBlocked?'<div style="font-size:9px;color:var(--rd);font-weight:700;">⚠ 차단</div>':''}
      </div>
      <div style="padding:8px;background:rgba(255,75,110,${sig.shortScore>=55?0.2:0.08});border:1px solid rgba(255,75,110,${sig.shortScore>=55?0.5:0.2});border-radius:4px;text-align:center;">
        <div style="font-size:10px;color:var(--tx2);font-weight:700;">숏 점수</div>
        <div style="font-size:22px;font-weight:900;color:var(--rd);">${sig.shortScore}</div>
        ${sig.backtest&&sig.backtest.shortCount>0?`<div style="font-size:10px;color:var(--tx2);">백테 ${sig.backtest.shortWinRate}% (${sig.backtest.shortCount}회)</div>`:'<div style="font-size:9px;color:var(--tx3);">백테 N/A</div>'}
        ${sig.shortBlocked?'<div style="font-size:9px;color:var(--rd);font-weight:700;">⚠ 차단</div>':''}
      </div>
    </div>`;

  // 점수 분해 (breakdown)
  const bd=sig.dir==='short'?sig.shortBreakdown:sig.longBreakdown;
  const bdHtml=`
    <div style="grid-column:1/-1;background:var(--bg3);border:1px solid var(--bd);border-radius:4px;padding:6px;margin-bottom:6px;font-size:11px;">
      <div style="color:var(--gd);font-weight:700;margin-bottom:4px;font-size:10px;">${sig.dir==='short'?'숏':'롱'} 점수 분해</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;">
        <div>DMI/ADX: <b>${bd.dmi}/25</b></div>
        <div>1H EMA: <b>${bd.ema}/15</b></div>
        <div>스토: <b>${bd.stoch}/30</b></div>
        <div>RSI: <b>${bd.rsi}/20</b></div>
        <div style="grid-column:1/-1;">MACD: <b>${bd.macd}/10</b></div>
      </div>
    </div>`;

  // 엘리엇/피보
  let elHtml='';
  if(sig.indicators.elliott){
    const e=sig.indicators.elliott;
    const lv=e.levels;
    elHtml=`<div style="grid-column:1/-1;background:var(--bg3);border:1px solid var(--bd);border-radius:4px;padding:6px;margin-bottom:6px;font-size:11px;">
      <div style="color:var(--gd);font-weight:700;margin-bottom:4px;font-size:10px;">엘리엇 파동 추정 · 피보나치 (1H)</div>
      <div>${e.waveLabel} · 방향: ${e.isUp?'▲ 상승':'▼ 하락'}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:4px;font-size:10px;">
        <div style="color:var(--tx2);">0.236: <b style="color:var(--tx)">$${fu(lv[0.236])}</b></div>
        <div style="color:var(--tx2);">0.382: <b style="color:var(--tx)">$${fu(lv[0.382])}</b></div>
        <div style="color:var(--gn);">0.618: <b>$${fu(lv[0.618])}</b></div>
        <div style="color:var(--gd);">0.786: <b>$${fu(lv[0.786])}</b></div>
        <div style="color:var(--tx2);">1.272: <b style="color:var(--tx)">$${fu(lv[1.272])}</b></div>
        <div style="color:var(--tx2);">1.618: <b style="color:var(--tx)">$${fu(lv[1.618])}</b></div>
      </div>
    </div>`;
  }

  grid.innerHTML=headerHtml+bdHtml+elHtml;

  // 조건 체크 리스트
  const checks=sig.dir==='short'?sig.checks:sig.checks;
  checks.forEach(c=>{
    const d=document.createElement('div');
    d.className='cond-item'+(c.ok?' ok':'');
    d.innerHTML=`<span class="cond-label">${c.ok?'●':'○'} ${c.lbl}</span><span class="cv">${c.val||''}</span>`;
    grid.appendChild(d);
  });

  // 보조 지표값 헤더
  if(sig.indicators.rsi){const v=sig.indicators.rsi[sig.indicators.rsi.length-1];document.getElementById('v-rsi').textContent=v.toFixed(1);}
  if(sig.indicators.macd)document.getElementById('v-macd').textContent=sig.indicators.macd.lastHist.toFixed(3);
  if(sig.indicators.adx)document.getElementById('v-adx').textContent=`${sig.indicators.adx.lastADX.toFixed(0)} / +${sig.indicators.adx.lastPlus.toFixed(0)} / -${sig.indicators.adx.lastMinus.toFixed(0)}`;
  if(sig.indicators.st1)document.getElementById('v-st1').textContent=`${sig.indicators.st1.lastK.toFixed(0)}/${sig.indicators.st1.lastD.toFixed(0)}`;
  if(sig.indicators.st2)document.getElementById('v-st2').textContent=`${sig.indicators.st2.lastK.toFixed(0)}/${sig.indicators.st2.lastD.toFixed(0)}`;
  if(sig.indicators.st3)document.getElementById('v-st3').textContent=`${sig.indicators.st3.lastK.toFixed(0)}/${sig.indicators.st3.lastD.toFixed(0)}`;

  // 차트에 지표 그리기
  drawIndicators(sig,candles);

  // 알림 발사 (70점 기준)
  if(sig.score>=70&&sig.dir!=='wait'&&(sig.dir!==S.lastDir||sig.score>S.lastScore+5)){
    addAlert(sig.score,sig.dir,sig.plan.entry);
    if(sig.score>=85){playBeep(1200,400);}
    else if(sig.score>=70){playBeep(1000,250);}
  }
  S.lastScore=sig.score;
  S.lastDir=sig.dir;
  S.scanScores[S.coin]={score:sig.score,dir:sig.dir};
}

function addAlert(score,dir,price){
  const t=new Date().toLocaleTimeString('ko-KR',{hour12:false});
  S.alerts.unshift({t,score,dir,price,coin:S.coin});
  S.alerts=S.alerts.slice(0,20);
  renderAlerts();
}
function renderAlerts(){
  const el=document.getElementById('alert-list');
  el.innerHTML=S.alerts.map(a=>`<div class="alert-row"><span class="at">${a.t}</span><span class="as ${a.dir}">${a.dir==='long'?'▲':'▼'} ${a.score}pt</span><span>${a.coin.replace('USDT','')}</span><span>$${fu(a.price)}</span></div>`).join('');
}

// ═══════════════════════════════════════════════
// 9. SCANNER
// ═══════════════════════════════════════════════
function renderScanner(){
  const sc=document.getElementById('scanner');
  sc.innerHTML='';
  COINS.forEach(c=>{
    const d=document.createElement('div');
    d.className='coin-card'+(c.code===S.coin?' active':'');
    const sc2=S.scanScores[c.code];
    const dirArrow=sc2?(sc2.dir==='long'?'▲':sc2.dir==='short'?'▼':'──'):'';
    const dirColor=sc2?(sc2.dir==='long'?'var(--gn)':sc2.dir==='short'?'var(--rd)':'var(--tx3)'):'var(--tx3)';
    d.innerHTML=`<div class="cn">${c.name}</div><div class="cs" style="color:${dirColor}">${dirArrow} ${sc2?sc2.score:'-'}pt</div><div class="cp">$${fu(S.prices[c.code])}</div>`;
    d.onclick=()=>{S.coin=c.code;document.getElementById('coin-sel').value=c.code;refreshAll();renderScanner();};
    sc.appendChild(d);
  });
}

async function scanAllCoins(){
  // 백그라운드로 모든 코인 5분 데이터 가져와 점수만 계산
  for(const c of COINS){
    if(c.code===S.coin)continue;
    try{
      const candles=await loadKlines(c.code,'5m',200);
      if(candles.length<60)continue;
      const sig=calcSignal(candles);
      S.scanScores[c.code]={score:sig.score,dir:sig.dir};
    }catch(e){}
  }
  renderScanner();
}

// ═══════════════════════════════════════════════
// 10. WEBSOCKET
// ═══════════════════════════════════════════════
function connectWS(){
  if(S.ws){try{S.ws.close();}catch(e){}S.ws=null;}
  const streams=COINS.map(c=>c.code.toLowerCase()+'@miniTicker').join('/');
  const url='wss://stream.binance.com:9443/stream?streams='+streams;
  try{
    S.ws=new WebSocket(url);
    S.ws.onopen=()=>{document.getElementById('live-st').className='live on';document.getElementById('live-st').textContent='● LIVE';};
    S.ws.onclose=()=>{document.getElementById('live-st').className='live off';document.getElementById('live-st').textContent='● OFF';setTimeout(connectWS,3000);};
    S.ws.onerror=e=>logErr('ws',e);
    S.ws.onmessage=e=>{
      try{
        const m=JSON.parse(e.data);
        if(m.data&&m.data.s){
          S.prices[m.data.s]=+m.data.c;
          if(m.data.s===S.coin){
            document.getElementById('h-price').textContent='$'+fu(+m.data.c);
          }
        }
      }catch(err){}
    };
  }catch(e){logErr('connectWS',e);setTimeout(connectWS,3000);}
}

// ═══════════════════════════════════════════════
// 11. CONTROLS
// ═══════════════════════════════════════════════
function toggleSound(){
  S.soundOn=!S.soundOn;
  const b=document.getElementById('snd-btn');
  b.textContent=S.soundOn?'🔔 ON':'🔕 OFF';
  b.classList.toggle('active',S.soundOn);
}
function toggleHLine(){
  S.hLineMode=!S.hLineMode;
  const b=document.getElementById('hline-btn');
  b.classList.toggle('active',S.hLineMode);
  b.textContent=S.hLineMode?'✏ ON':'✏';
  document.getElementById('main-chart').style.cursor=S.hLineMode?'crosshair':'default';
}

// TF 탭
document.querySelectorAll('.tf-tab').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tf-tab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    S.tf=b.dataset.tf;
    initTV(S.coin,tfToTVInterval(S.tf));
    refreshAll();
  });
});
// 코인 선택
document.getElementById('coin-sel').addEventListener('change',e=>{
  S.coin=e.target.value;
  initTV(S.coin,tfToTVInterval(S.tf));
  refreshAll();
  renderScanner();
});

// ═══════════════════════════════════════════════
// 12. INIT
// ═══════════════════════════════════════════════
async function init(){
  if('Notification' in window&&Notification.permission==='default')Notification.requestPermission().catch(()=>{});
  initCharts();
  initTV(S.coin,tfToTVInterval(S.tf));
  renderScanner();
  document.getElementById('snd-btn').classList.add('active');
  connectWS();
  await refreshAll();
  // 백그라운드 스캐너
  setTimeout(scanAllCoins,3000);
  // 5초마다 재계산 (메인 코인)
  setInterval(()=>{
    const c=S.candles[S.coin+'_'+S.tf];
    if(!c||!c.length)return;
    // 마지막 캔들 현재가로 갱신
    const lastPrice=S.prices[S.coin];
    if(lastPrice&&isFinite(lastPrice)){
      const last={...c[c.length-1]};
      last.close=lastPrice;
      if(lastPrice>last.high)last.high=lastPrice;
      if(lastPrice<last.low)last.low=lastPrice;
      const newArr=c.slice(0,-1).concat([last]);
      computeAndRender(newArr);
    }
  },5000);
  // 1분마다 캔들 새로고침
  setInterval(refreshAll,60000);
  // 5분마다 스캐너 재계산
  setInterval(scanAllCoins,5*60*1000);
}

init().catch(e=>logErr('init',e));
</script>
