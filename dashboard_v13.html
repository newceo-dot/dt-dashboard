<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DT Dashboard v13 - Optimized</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{
  --bg:#f5f5f5;--bg2:#ffffff;--bg3:#f0f0f0;--bd:#e0e0e0;
  --tx:#1a1a2e;--tx2:#666680;--go:#c8860a;--gn:#0a7a6a;
  --rd:#c0392b;--bl:#1a5fb4;--sk:#1971c2;--pu:#7048e8;
  --up:#0a7a6a;--dn:#c0392b;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--tx);font-family:'Malgun Gothic','맑은 고딕',sans-serif;font-size:11px;display:flex;flex-direction:column;}

/* HEADER */
#hd{height:40px;background:var(--bg2);border-bottom:2px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.logo{color:var(--bl);font-weight:900;font-size:14px;margin-right:4px;letter-spacing:-0.5px;}
.hb{display:flex;align-items:center;gap:4px;padding:3px 9px;background:var(--bg3);border:1px solid var(--bd);border-radius:4px;white-space:nowrap;}
.hl{color:var(--tx2);font-size:8px;font-weight:600;}
.hv{color:var(--tx);font-weight:700;font-size:12px;}
#sig{margin-left:auto;display:flex;gap:5px;align-items:center;}

/* 피봇 돌파 빅 배너 */
#pivot-banner{position:sticky;top:48px;z-index:95;margin:0;padding:14px 20px;text-align:center;font-size:22px;font-weight:900;letter-spacing:2px;border-bottom:3px solid;animation:pulse-pivot 1.5s ease-in-out infinite;}
#pivot-banner.long{background:linear-gradient(90deg,rgba(15,214,111,0.25),rgba(15,214,111,0.45),rgba(15,214,111,0.25));border-color:#0fd66f;color:#0fd66f;text-shadow:0 0 10px rgba(15,214,111,0.5);}
#pivot-banner.short{background:linear-gradient(90deg,rgba(255,75,110,0.25),rgba(255,75,110,0.45),rgba(255,75,110,0.25));border-color:#ff4b6e;color:#ff4b6e;text-shadow:0 0 10px rgba(255,75,110,0.5);}
@keyframes pulse-pivot{0%,100%{opacity:1;}50%{opacity:0.75;}}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden;min-height:0;}

/* SCANNER */
#sc{width:120px;background:var(--bg2);border-right:2px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;}
.sc-top{padding:5px 7px;border-bottom:1px solid var(--bd);font-size:9px;font-weight:700;color:var(--tx2);display:flex;justify-content:space-between;background:var(--bg3);}
#cl{flex:1;overflow-y:auto;}
#cl::-webkit-scrollbar{width:3px;}
#cl::-webkit-scrollbar-thumb{background:var(--bd);}
.ci{padding:5px 7px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;}
.ci:hover{background:var(--bg3);}
.ci.act{background:#e8f4fd;border-left:3px solid var(--bl);}
.ci-r1{display:flex;justify-content:space-between;align-items:center;}
.cn{color:var(--tx);font-weight:700;font-size:10px;}

/* CHART AREA WRAPPER */
#chart-content-wrapper {
  flex:1; display:flex; flex-direction:column; min-width:0; background:var(--bg);
}

/* 상단 차트 탭 바 */
#chart-tabs-bar {
  display:flex; gap:2px; background:var(--bg2); border-bottom:1px solid var(--bd); padding:2px 10px 0 10px; flex-shrink:0; z-index:10;
}
.chart-tab {
  background:transparent; border:none; border-bottom:3px solid transparent; padding:6px 16px; font-size:11px; font-weight:700; color:var(--tx2); cursor:pointer; font-family:inherit; transition:all 0.2s;
}
.chart-tab.active {
  color:var(--bl); border-bottom-color:var(--bl); background:rgba(25,113,194,0.05);
}

/* 차트 블록 공통 */
.cblock{background:var(--bg2);border:1px solid var(--bd);border-radius:4px;display:flex;flex-direction:column;flex-shrink:0;box-shadow:0 1px 3px rgba(0,0,0,.05);}
.ch{background:var(--bg3);padding:3px 8px;display:flex;align-items:center;gap:6px;height:24px;flex-shrink:0;border-bottom:1px solid var(--bd);border-radius:4px 4px 0 0;}
.tf-btn{font-size:8px;padding:1px 5px;border-radius:2px;cursor:pointer;border:1px solid var(--bd);background:var(--bg2);color:var(--tx2);font-family:inherit;}
.tf-btn.active{background:var(--bl);color:#fff;border-color:var(--bl);}

/* 드로잉 툴바 */
#left-toolbar{width:36px;background:var(--bg2);border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;padding:4px 0;gap:2px;flex-shrink:0;}
.ltool{width:28px;height:28px;background:transparent;border:none;color:var(--tx2);cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:center;}
.ltool.active{background:rgba(25,113,194,0.2);color:#1971c2;}
.ltool-danger{color:var(--rd)!important;}

/* 드로잉 캔버스 */
.draw-canvas{position:absolute;inset:0;pointer-events:none;z-index:10;}

/* INFO PANEL */
#ip{width:240px;background:var(--bg2);border-left:2px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
.is{border-bottom:1px solid var(--bd);padding:8px 10px;}
.it{font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:5px;}

/* 지표 리사이즈 핸들 */
.ind-resize-handle{height:5px;background:transparent;cursor:row-resize;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ind-resize-handle:hover{background:rgba(25,113,194,0.2);}

/* BOTTOM */
#bt{height:26px;background:var(--bg2);border-top:2px solid var(--bd);display:flex;align-items:center;padding:0 10px;gap:8px;flex-shrink:0;}
#bclk{color:var(--tx2);font-size:9px;font-weight:600;margin-left:auto;}

@media (max-width:700px){
  #sc, #left-toolbar { display:none; }
  #ip { position:fixed; right:-240px; }
  #chart-tabs-bar { padding: 5px; }
}
</style>
</head>
<body>

<div id="hd">
  <div class="logo">⬡ DT v13</div>
  <div style="display:flex;align-items:center;gap:4px;background:var(--bg3);border:1px solid var(--bd);border-radius:4px;padding:2px 6px;">
    <input id="coin-search" type="text" placeholder="심볼 검색" style="background:transparent;border:none;outline:none;width:100px;" oninput="onSearchInput(this.value)">
  </div>
  <div class="hb"><span class="hl">코인</span><span class="hv" id="hcoin" style="color:var(--bl)">BTC/USDT</span></div>
  <div class="hb"><span class="hl">현재가</span><span class="hv" id="hprice">--</span></div>
  <div id="sig">
    <div id="wst" class="off">● OFF</div>
  </div>
</div>

<div id="pivot-banner" style="display:none;"></div>

<div id="main">
  <!-- 스캐너 -->
  <div id="sc">
    <div class="sc-top"><span>SCANNER</span><span id="scnt">0</span></div>
    <div id="cl"></div>
  </div>

  <!-- 드로잉 툴바 -->
  <div id="left-toolbar">
    <button class="ltool active" data-tool="none" onclick="setDrawTool('none',this)" title="선택(V)"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 2l4 12 2.5-4 4 4 1.5-1.5-4-4 4-2.5z" fill="currentColor"/></svg></button>
    <button class="ltool" data-tool="hline" onclick="setDrawTool('hline',this)" title="수평선(H)"><svg width="16" height="16" viewBox="0 0 16 16"><line x1="1" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="2" fill="currentColor"/></svg></button>
    <button class="ltool" data-tool="trend" onclick="setDrawTool('trend',this)" title="추세선(T)"><svg width="16" height="16" viewBox="0 0 16 16"><line x1="2" y1="14" x2="14" y2="2" stroke="currentColor" stroke-width="1.5"/></svg></button>
    <button class="ltool" data-tool="fib" onclick="setDrawTool('fib',this)" title="피보나치(F)"><text x="2" y="12" font-size="11" fill="currentColor">Φ</text></button>
    <div class="ltool-sep"></div>
    <button class="ltool ltool-danger" onclick="clearAllDrawings()" title="삭제"><svg width="16" height="16" viewBox="0 0 16 16"><path d="M4 4l8 8m0-8l-8 8" stroke="currentColor" stroke-width="2"/></svg></button>
  </div>

  <!-- 차트 영역 -->
  <div id="chart-content-wrapper">
    <!-- 탭 바 (위로 이동됨) -->
    <div id="chart-tabs-bar">
      <button class="chart-tab active" onclick="switchChartView('dual')" id="tab-dual">듀얼 차트</button>
      <button class="chart-tab" onclick="switchChartView('multi')" id="tab-multi">멀티 차트</button>
    </div>

    <!-- 듀얼 차트 뷰 -->
    <div id="view-dual" style="display:flex; flex:1; gap:2px; padding:2px; overflow:hidden;">
      <!-- 왼쪽 차트 -->
      <div style="flex:1; display:flex; flex-direction:column; gap:2px;">
        <div class="ch">
          <button class="tf-btn active" onclick="changeTFDual('3m','cL',this,'L')">3분</button>
          <button class="tf-btn" onclick="changeTFDual('15m','cL',this,'L')">15분</button>
          <span class="dir-badge" id="dirL">--</span>
        </div>
        <div style="flex:1; position:relative; background:#fff;">
          <div id="cL" style="position:absolute; inset:0;"></div>
          <canvas class="draw-canvas" id="canvas-cL"></canvas>
        </div>
        <div class="ind-resize-handle" onmousedown="startIndResize(event,'cL-rsi-wrap')"></div>
        <div id="cL-rsi-wrap" style="height:80px; flex-shrink:0; border:1px solid var(--bd);">
            <div id="cL-rsi" style="height:100%;"></div>
        </div>
      </div>
      <!-- 오른쪽 차트 -->
      <div style="flex:1; display:flex; flex-direction:column; gap:2px;">
        <div class="ch">
          <button class="tf-btn active" onclick="changeTFDual('1h','cR',this,'R')">1H</button>
          <button class="tf-btn" onclick="changeTFDual('4h','cR',this,'R')">4H</button>
          <span class="dir-badge" id="dirR">--</span>
        </div>
        <div style="flex:1; position:relative; background:#fff;">
          <div id="cR" style="position:absolute; inset:0;"></div>
          <canvas class="draw-canvas" id="canvas-cR"></canvas>
        </div>
        <div class="ind-resize-handle" onmousedown="startIndResize(event,'cR-rsi-wrap')"></div>
        <div id="cR-rsi-wrap" style="height:80px; flex-shrink:0; border:1px solid var(--bd);">
            <div id="cR-rsi" style="height:100%;"></div>
        </div>
      </div>
    </div>

    <!-- 멀티 차트 뷰 (기존 구조 유지) -->
    <div id="view-multi" style="display:none; flex:1; gap:2px; padding:2px;">
        <div id="ca" style="display:grid; grid-template-columns:1fr 1fr; width:100%; gap:2px;">
            <div id="c3m" class="cblock" style="height:300px;"></div>
            <div id="c15m" class="cblock" style="height:300px;"></div>
            <div id="c1h" class="cblock" style="height:300px;"></div>
            <div id="c4h" class="cblock" style="height:300px;"></div>
        </div>
    </div>
  </div>

  <!-- 정보 패널 -->
  <div id="ip">
    <div class="is">
      <div class="dir-big neut" id="dir-big">-- 방향 판단중</div>
      <div id="scnum" style="font-size:24px; font-weight:bold; text-align:center;">--</div>
    </div>
    <div class="is"><div class="it">진입 플랜</div><div id="t-en">--</div></div>
    <div class="is"><div class="it">AI 분석</div><button id="aibtn" onclick="askAI()">AI 요청</button></div>
  </div>
</div>

<div id="bt">
  <div id="atick">신호 대기중...</div>
  <div id="bclk">00:00:00</div>
</div>

<script>
// --- 초기 설정 및 상태 ---
const S = {
  coin: {code:'KRW-BTC', usdt:'BTCUSDT', name:'BTC'},
  charts: {}, series: {}, indSeries: {}, prices: {}, candles: {},
  hLines: {}, dualTF: {L:'3m', R:'1h'}, alerts: [],
  apiKey: localStorage.getItem('dtv5ak') || ''
};

const COPT = {
  layout:{background:{type:'Solid',color:'#ffffff'},textColor:'#666680'},
  grid:{vertLines:{color:'#f0f0f0'},horzLines:{color:'#f0f0f0'}},
  timeScale:{borderColor:'#e0e0e0',timeVisible:true},
  rightPriceScale:{borderColor:'#e0e0e0',width:55},
};

// --- 차트 생성 ---
function initCharts() {
  const chartIds = ['cL', 'cR', 'c3m', 'c15m', 'c1h', 'c4h'];
  chartIds.forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    const c = LightweightCharts.createChart(el, {...COPT, width:el.offsetWidth, height:el.offsetHeight});
    const cs = c.addCandlestickSeries({upColor:'#0a7a6a',downColor:'#c0392b'});
    S.charts[id] = c; S.series[id] = cs;
    
    new ResizeObserver(() => c.resize(el.offsetWidth, el.offsetHeight)).observe(el);
  });

  // RSI 초기화
  ['cL-rsi', 'cR-rsi'].forEach(id => {
    const el = document.getElementById(id);
    const c = LightweightCharts.createChart(el, {...COPT, height: 80, timeScale:{visible:false}});
    const rs = c.addLineSeries({color:'#7048e8', lineWidth:1});
    S.charts[id] = c; S.indSeries[id] = rs;
  });

  // 십자선 동기화
  syncCrosshair('cL', 'cR');
  syncCrosshair('cR', 'cL');
}

function syncCrosshair(srcId, dstId) {
    S.charts[srcId].subscribeCrosshairMove(p => {
        if (!p.time) { S.charts[dstId].clearCrosshairPosition(); return; }
        S.charts[dstId].setCrosshairPosition(p.point.y, p.time, S.series[dstId]);
    });
}

// --- 뷰 전환 ---
function switchChartView(view) {
  document.getElementById('view-dual').style.display = (view === 'dual' ? 'flex' : 'none');
  document.getElementById('view-multi').style.display = (view === 'multi' ? 'flex' : 'none');
  document.getElementById('tab-dual').classList.toggle('active', view === 'dual');
  document.getElementById('tab-multi').classList.toggle('active', view === 'multi');

  setTimeout(() => {
    Object.keys(S.charts).forEach(k => {
      const el = document.getElementById(k);
      if(el) S.charts[k].resize(el.offsetWidth, el.offsetHeight);
    });
  }, 50);
}

// --- 드로잉 시스템 ---
let drawState = { tool: 'none', drawings: [] };
function setDrawTool(tool, btn) {
    drawState.tool = tool;
    document.querySelectorAll('.ltool').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function clearAllDrawings() {
    drawState.drawings = [];
    alert("모든 드로잉이 삭제되었습니다.");
}

// --- 데이터 로직 ---
async function fetchCandles(symbol, interval, limit=300) {
    try {
        const r = await fetch(`https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
        const d = await r.json();
        return d.map(k => ({time:k[0]/1000, open:+k[1], high:+k[2], low:+k[3], close:+k[4]}));
    } catch(e) { return []; }
}

async function changeTFDual(tf, chartId, btn, side) {
    btn.closest('.ch').querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const data = await fetchCandles(S.coin.usdt, tf);
    if(data.length) {
        S.series[chartId].setData(data);
        // RSI 등 지표 업데이트 로직 추가 가능
    }
}

// --- 초기화 실행 ---
window.onload = async () => {
    initCharts();
    const btcData = await fetchCandles('BTCUSDT', '3m');
    const btc1hData = await fetchCandles('BTCUSDT', '1h');
    if(btcData.length) S.series['cL'].setData(btcData);
    if(btc1hData.length) S.series['cR'].setData(btc1hData);
    
    setInterval(() => {
        document.getElementById('bclk').textContent = new Date().toLocaleTimeString();
    }, 1000);
};

function startIndResize(e, id) {
    const el = document.getElementById(id);
    const startY = e.clientY;
    const startH = el.offsetHeight;
    const onMove = (me) => {
        el.style.height = (startH + (me.clientY - startY)) + 'px';
        Object.values(S.charts).forEach(c => c.resize());
    };
    const onUp = () => { document.removeEventListener('mousemove', onMove); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
}
</script>
</body>
</html>
